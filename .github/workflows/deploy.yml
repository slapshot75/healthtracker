name: Test & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium

      - name: E2E-Tests ausführen
        run: npx playwright test

      - name: Test-Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dateien zusammenstellen und Keys einsetzen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p public/css public/js

          cp css/styles.css public/css/styles.css
          cp index.html public/index.html

          sed "s|SUPABASE_URL_PLACEHOLDER|${SUPABASE_URL}|g" js/app.js \
            | sed "s|SUPABASE_KEY_PLACEHOLDER|${SUPABASE_ANON_KEY}|g" \
            > public/js/app.js

          # Verifikation
          grep -q "supabase.co" public/js/app.js && echo "OK SUPABASE_URL"  || echo "FEHLT SUPABASE_URL"
          grep -q "eyJ"         public/js/app.js && echo "OK SUPABASE_KEY"  || echo "FEHLT SUPABASE_KEY"
          test -f public/css/styles.css          && echo "OK CSS"           || echo "FEHLT CSS"
          test -f public/js/app.js               && echo "OK JS"            || echo "FEHLT JS"

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Artifact hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deployen
        id: deployment
        uses: actions/deploy-pages@v4
